<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon Leads — Contact Us</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
    }

    h1 {
      font-size: 1.6rem;
      color: #111;
      margin-bottom: .4rem;
    }

    p.subtitle {
      color: #555;
      font-size: .95rem;
      margin-bottom: 1.8rem;
    }

    label {
      display: block;
      font-size: .88rem;
      font-weight: 600;
      color: #333;
      margin-bottom: .3rem;
      margin-top: 1rem;
    }

    input, textarea {
      width: 100%;
      padding: .6rem .8rem;
      border: 1.5px solid #d1d5db;
      border-radius: 7px;
      font-size: .95rem;
      transition: border-color .2s;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #ff9900;
    }

    textarea { resize: vertical; min-height: 80px; }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: .75rem;
      background: #ff9900;
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s;
    }

    button:hover { background: #e88a00; }

    #status {
      margin-top: 1rem;
      font-size: .9rem;
      text-align: center;
      min-height: 1.2em;
    }

    .success { color: #16a34a; }
    .error   { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛒 Amazon Leads</h1>
    <p class="subtitle">Fill in your details and we'll get back to you.</p>

    <form id="leadForm">
      <label for="name">Full Name *</label>
      <input id="name" name="name" type="text" placeholder="Your name" required />

      <label for="email">Email Address *</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required />

      <label for="phone">Phone Number</label>
      <input id="phone" name="phone" type="tel" placeholder="+1 555 000 0000" />

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Anything you'd like to tell us…"></textarea>

      <button type="submit">Submit</button>
    </form>

    <p id="status"></p>
  </div>

  <script>
    document.getElementById("leadForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const status = document.getElementById("status");
      status.textContent = "Sending…";
      status.className = "";

      const body = new FormData(e.target);

      try {
        const res = await fetch("/leads", { method: "POST", body });
        const data = await res.json();
        if (res.ok) {
          status.textContent = "✅ " + data.message;
          status.className = "success";
          e.target.reset();
        } else {
          const detail = data.detail || data.message || "Something went wrong. Please try again.";
          status.textContent = "❌ " + detail;
          status.className = "error";
        }
      } catch {
        status.textContent = "❌ Network error. Please try again.";
        status.className = "error";
      }
    });
  </script>
</body>
</html>
